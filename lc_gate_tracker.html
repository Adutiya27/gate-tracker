<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agra LC Gate Tracker</title>
  
  <!-- Load fonts from Google Fonts as requested -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Light Clean Aesthetic CSS Variables */
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #475569;
      --bright: #0f172a;
      --accent: #2563eb;
      
      --open: #16a34a;
      --open-bg: #dcfce7;
      --soon: #d97706;
      --soon-bg: #fef3c7;
      --closed: #dc2626;
      --closed-bg: #fee2e2;
      
      --font-ui: system-ui, -apple-system, sans-serif;
      --font-data: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      padding-bottom: 4rem;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background-color: rgba(79, 110, 247, 0.3);
      color: var(--bright);
    }

    /* Sticky Topbar styling - Professional Polish Theme */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.25), 0 2px 4px -1px rgba(0, 0, 0, 0.15);
    }

    .topbar-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.25rem;
    }

    @media (max-width: 768px) {
      .topbar-container {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-title {
      color: var(--bright);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      font-size: 0.75rem;
      color: var(--text);
      opacity: 0.8;
      font-family: var(--font-data);
      letter-spacing: 0.1em;
    }

    /* Controls block in Topbar */
    .controls {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background-color: var(--bg);
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .controls {
        margin-left: 0;
        width: 100%;
        justify-content: space-between;
      }
    }

    .time-cluster {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    @media (max-width: 768px) {
      .time-cluster {
        align-items: flex-start;
      }
    }

    .clock {
      font-family: var(--font-data);
      font-size: 1.25rem;
      color: var(--bright);
      font-weight: 600;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .auto-refresh-label {
      font-size: 0.65rem;
      opacity: 0.8;
      color: var(--accent);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .refresh-btn {
      background-color: var(--border);
      border: 1px solid transparent;
      color: var(--bright);
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      font-family: var(--font-ui);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: all 0.2s ease-in-out;
      touch-action: manipulation;
    }

    .refresh-btn:hover {
      background-color: #f1f5f9;
      border-color: var(--border);
    }

    .refresh-btn:active {
      transform: scale(0.95);
    }

    /* Summary Bar */
    .summary-bar {
      max-width: 1200px;
      margin: 1.5rem auto 0 auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid transparent;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .summary-chip.open-chip {
      background-color: var(--open-bg);
      border-color: rgba(34, 197, 94, 0.2);
      color: var(--open);
    }

    .summary-chip.soon-chip {
      background-color: var(--soon-bg);
      border-color: rgba(245, 158, 11, 0.2);
      color: var(--soon);
    }

    .summary-chip.closed-chip {
      background-color: var(--closed-bg);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--closed);
    }

    /* Main Container & Card Grid */
    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.25rem;
      padding: 1.25rem 0 2rem 0;
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Cards - Professional Polish with border-l-4 Left Indicator bar */
    .card {
      background-color: var(--panel);
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-left: 1px solid var(--border); /* replaced absolute layout to simulate border-l-4 beautifully */
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.2s ease-in-out;
    }

    /* Left absolute color-coded status bar simulated from .card-top-border */
    .card-top-border {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      height: 100%;
    }

    .card-top-border.status-closed { background-color: var(--closed); }
    .card-top-border.status-soon { background-color: var(--soon); }
    .card-top-border.status-open { background-color: var(--open); }

    .card-body {
      padding: 1rem 1.25rem 1.25rem 1.5rem; /* left padding clears the absolute 4px status bar */
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      flex-grow: 1;
    }

    /* Card Header */
    .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .card-tag-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .gate-badge {
      font-family: var(--font-data);
      font-size: 0.65rem;
      font-weight: 900;
      color: #ffffff;
      background-color: var(--accent);
      opacity: 0.95;
      padding: 0.15rem 0.35rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    /* Different backgrounds for gate badges based on nearest top border status sibling */
    .card-top-border.status-closed ~ .card-body .gate-badge { background-color: var(--closed); color: #ffffff; }
    .card-top-border.status-soon ~ .card-body .gate-badge { background-color: var(--soon); color: #ffffff; }
    .card-top-border.status-open ~ .card-body .gate-badge { background-color: var(--open); color: #ffffff; }

    .crossing-name {
      color: var(--bright);
      font-size: 1.15rem;
      font-weight: 700;
    }

    .crossing-area {
      font-size: 0.8rem;
      color: var(--text);
      opacity: 0.6;
    }

    /* Pulse Status Indicator Block */
    .status-block {
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .status-block.status-bg-closed {
      background-color: var(--closed-bg);
      border: 1px solid rgba(239, 68, 68, 0.15);
    }

    .status-block.status-bg-soon {
      background-color: var(--soon-bg);
      border: 1px solid rgba(245, 158, 11, 0.15);
    }

    .status-block.status-bg-open {
      background-color: var(--open-bg);
      border: 1px solid rgba(34, 197, 94, 0.15);
    }

    .status-badge-row {
      display: flex;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
    }

    .status-label-closed { color: var(--closed); }
    .status-label-soon { color: var(--soon); }
    .status-label-open { color: var(--open); }

    /* Animated status dot */
    @keyframes pulse-closed {
      0% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); }
      100% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    @keyframes pulse-soon {
      0% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.5); }
      70% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 5px rgba(245, 158, 11, 0); }
      100% { transform: scale(0.95); opacity: 0.8; box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 0.4rem;
    }

    .status-dot.dot-closed {
      background-color: var(--closed);
      animation: pulse-closed 0.7s infinite ease-in-out;
      box-shadow: 0 0 8px var(--closed);
    }

    .status-dot.dot-soon {
      background-color: var(--soon);
      animation: pulse-soon 1.2s infinite ease-in-out;
      box-shadow: 0 0 8px var(--soon);
    }

    .status-dot.dot-open {
      background-color: var(--open);
    }

    .status-headline {
      color: var(--bright);
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.35;
      font-family: var(--font-data);
    }

    .edit-name-btn {
      background: none;
      border: none;
      color: var(--text);
      opacity: 0.5;
      cursor: pointer;
      font-size: 1.1rem;
      margin-left: 0.35rem;
      transition: all 0.2s;
    }
    .edit-name-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }
    .crossing-name-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-details {
      display: none;
      flex-direction: column;
      gap: 0.85rem;
      margin-top: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px dashed var(--border);
    }
    .card-footer-collapsible {
      display: none;
    }
    .card-clickable {
      cursor: pointer;
    }
    .card-clickable:hover .crossing-name {
      color: var(--accent);
    }
    .expand-icon {
      font-size: 0.8rem;
      color: var(--text);
      transition: transform 0.2s;
      margin-left: 0.5rem;
    }

    /* Track line pill */
    .track-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background-color: #f1f5f9;
      border: 1px solid var(--border);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      width: fit-content;
      color: var(--text);
      font-weight: 500;
    }

    /* Stations Section */
    .stations-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 0;
    }

    .station-cell {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .station-title {
      font-size: 0.65rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .station-name {
      color: var(--bright);
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .station-distance {
      font-family: var(--font-data);
      font-size: 0.75rem;
      opacity: 0.8;
    }

    .station-code {
      color: var(--accent);
      font-weight: bold;
    }

    /* Approaching Trains Section */
    .trains-section {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .trains-title {
      font-size: 0.75rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: bold;
    }

    .trains-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .no-trains-notice {
      font-size: 0.75rem;
      opacity: 0.5;
      font-style: italic;
    }

    .train-pill {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.35rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      border: 1px solid transparent;
      font-family: var(--font-data);
    }

    .train-pill.t-closed {
      background-color: var(--closed-bg);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--closed);
    }

    .train-pill.t-soon {
      background-color: var(--soon-bg);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--soon);
    }

    .train-pill.t-open {
      background-color: var(--open-bg);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--open);
    }

    .train-info {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 0.5rem;
    }

    .train-no {
      font-weight: 700;
      color: var(--accent);
      margin-right: 0.35rem;
    }

    /* Card Footer */
    .card-footer {
      border-top: 1px solid var(--border);
      padding: 0.75rem 1.25rem 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8fafc;
    }

    .tracked-count {
      font-size: 0.75rem;
      color: var(--text);
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.02em;
    }

    .action-links {
      display: flex;
      gap: 0.4rem;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background-color: #ffffff;
      border: 1px solid var(--border);
      color: var(--bright);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .action-btn:hover {
      background-color: #f1f5f9;
      border-color: var(--accent);
      color: var(--bright);
    }

    /* Modal styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(12, 14, 20, 0.85); backdrop-filter: blur(4px);
      z-index: 1000; display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.5rem; width: 90%; max-width: 450px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .card-header-modal {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;
    }
    .form-group {
      display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem;
    }
    .form-group label {
      font-size: 0.75rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group input {
      background: var(--bg); border: 1px solid var(--border); color: var(--bright);
      padding: 0.75rem; border-radius: 4px; font-family: var(--font-ui); font-size: 0.9rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 0.5rem;
    }
    .btn-primary {
      background: var(--accent); color: white; border: none; padding: 0.6rem 1.2rem;
      border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
    }
    .btn-secondary {
      background: transparent; color: var(--text); border: 1px solid var(--border); padding: 0.6rem 1.2rem;
      border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
    }

    /* Bottom Warning Notice */
    .bottom-notice {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: var(--panel);
      color: var(--text);
      opacity: 0.9;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      padding: 0.5rem;
      text-align: center;
      z-index: 99;
      line-height: 1.4;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <!-- Sticky Topbar -->
  <header class="topbar">
    <div class="topbar-container">
      <div class="brand">
        <span class="brand-icon">🚦</span>
        <div class="brand-text">
          <h1 class="brand-title">LC GATE TRACKER</h1>
          <span class="brand-subtitle">Agra · 6 Crossings</span>
        </div>
      </div>

      <div class="controls">
        <button class="refresh-btn" onclick="openAddModal()">
          <span>➕</span> Add
        </button>
        <button class="refresh-btn" id="refresh-btn" onclick="triggerManualRefresh()">
          <span>↺</span> Refresh
        </button>
        <div class="time-cluster">
          <div class="clock" id="clock-display">00:00:00</div>
          <span class="auto-refresh-label" id="timer-display">Auto-refreshing in 60s</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Summary Bar showing gate status counts -->
  <div class="summary-bar" id="summary-bar">
    <div class="summary-chip open-chip">🟢 OPEN: <span id="summary-open-count">0</span></div>
    <div class="summary-chip soon-chip">🟡 CLOSING SOON: <span id="summary-soon-count">0</span></div>
    <div class="summary-chip closed-chip">🔴 CLOSED: <span id="summary-closed-count">0</span></div>
  </div>

  <!-- Main Card Grid -->
  <main class="main-container">
    <div class="grid" id="crossing-grid">
      <!-- Generated dynamically by script -->
    </div>
  </main>

  <!-- Add Crossing Modal -->
  <div id="add-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="card-header-modal">
        <h2 class="crossing-name">Add New Gate</h2>
        <button class="edit-name-btn" onclick="closeAddModal()" style="font-size: 1.5rem;">×</button>
      </div>
      <div class="form-group">
        <label>Gate Name</label>
        <input type="text" id="add-name" placeholder="e.g. My Neighborhood Gate" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Locality / Area</label>
        <input type="text" id="add-area" placeholder="e.g. MG Road Junction" autocomplete="off" />
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label>Latitude</label>
          <input type="number" id="add-lat" step="0.000001" placeholder="27.1700" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="number" id="add-lon" step="0.000001" placeholder="77.9800" autocomplete="off" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeAddModal()">Cancel</button>
        <button class="btn-primary" onclick="saveNewCrossing()">Save Gate</button>
      </div>
    </div>
  </div>

  <script>
    // Hardcoded LC Gate coordinates in Agra
    const BASE_CROSSINGS = [
      {
        id: 1,

        area: "Balkeshwar / Sikandra West",
        lat: 27.175170, lon: 77.939618,
        track: "Agra–Achhnera–Jaipur Line",
        station_a: { name: "Pathauli",   code: "PTLI", lat: 27.1567, lon: 77.9250 },
        station_b: { name: "Idgah Agra", code: "IDH",  lat: 27.1732, lon: 77.9990 }
      },
      {
        id: 2,
        name: "Sikandra Road Gate",
        area: "Sikandra–Bodla Road",
        lat: 27.173231, lon: 77.958255,
        track: "Agra–Achhnera–Jaipur Line",
        station_a: { name: "Pathauli",   code: "PTLI", lat: 27.1567, lon: 77.9250 },
        station_b: { name: "Idgah Agra", code: "IDH",  lat: 27.1732, lon: 77.9990 }
      },
      {
        id: 3,
        name: "Pratap Nagar Gate",
        area: "Alkapuri Colony, Pratap Nagar",
        lat: 27.171775, lon: 77.972703,
        track: "Agra–Bharatpur–Jaipur Line",
        station_a: { name: "Pathauli",   code: "PTLI", lat: 27.1567, lon: 77.9250 },
        station_b: { name: "Idgah Agra", code: "IDH",  lat: 27.1732, lon: 77.9990 }
      },
      {
        id: 4,
        name: "Nalbund Gate",
        area: "Nalbund Chauraha, MG Road",

    // Haversine exact calculation function
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1 * Math.PI/180) *
                Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function seededRandom(seed) {

      return function() {

      };
    }

    // Live API Integration
    const API_BASE_URL = "https://indian-rail-api-liart.vercel.app/api/v1";
    let liveCache = {}; // Cache to avoid spamming the API

    function fetchLiveTrainSchedule(trainNumber) {
      if (liveCache[trainNumber] && Date.now() - liveCache[trainNumber].timestamp < 300000) {
        return Promise.resolve(liveCache[trainNumber].data); // Use cached data for 5 minutes
      }
      
      // Prevent duplicate parallel queries before cache resolves
      if (window._fetchPromises && window._fetchPromises[trainNumber]) {
        return window._fetchPromises[trainNumber];
      }
      
      if (!window._fetchPromises) window._fetchPromises = {};

      const fetchPromise = fetch(`${API_BASE_URL}/route?trainNo=${trainNumber}`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);
          return res.json();
        })
        .then(data => {
          console.log("Live Train Data for " + trainNumber + ":", data);
          liveCache[trainNumber] = { timestamp: Date.now(), data: data };
          delete window._fetchPromises[trainNumber];
          return data;
        })
        .catch(error => {
          console.error("Failed to retrieve live telemetry for " + trainNumber + ":", error);
          delete window._fetchPromises[trainNumber];
          return null;
        });
        
      window._fetchPromises[trainNumber] = fetchPromise;
      return fetchPromise;
    }

    // Process the live schedule to compute arrival time in minutes from now
    function processTrainTracking(data, targetStationCode) {
      if (!data || !data.data || !Array.isArray(data.data)) return null;
      
      const stations = data.data;
      const station = stations.find(s => s.stationCode === targetStationCode);
      if (!station) return null;
      
      const timeStr = station.arrivalTime || station.departureTime;
      if (!timeStr || timeStr === "Source") return null; // Can't parse or is source station
      
      // timeStr usually "HH:MM", lets find diff from now
      const now = new Date();
      const parts = timeStr.split(":");
      if (parts.length < 2) return null;
      
      const scheduledTime = new Date();
      scheduledTime.setHours(parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
      
      let diffMs = scheduledTime - now;
      // If it's more than 12 hours away, maybe it's for tomorrow/yesterday
      if (diffMs < -43200000) diffMs += 86400000;
      else if (diffMs > 43200000) diffMs -= 86400000;
      
      return diffMs / 60000; // Return diff in minutes
    }

    async function getApproachingTrainsLive(crossing, distA, distB) {
      // Get all trains for both flanking stations
      const computedTrains = [];
      
      // We will only query a small subset of trains to not overload the API unnecessarily.
      // E.g., just the first 1-2 from each pool
      const poolA = STATION_TRAINS[crossing.station_a.code] || [];
      const poolB = STATION_TRAINS[crossing.station_b.code] || [];
      
      const targetTrainsA = poolA.slice(0, 2); 
      const targetTrainsB = poolB.slice(0, 2);
      
      for (const t of targetTrainsA) {
        const liveData = await fetchLiveTrainSchedule(t.no);
        let arrivalMins = processTrainTracking(liveData, crossing.station_a.code);
        
        if (arrivalMins === null) {
          // Fallback to deterministic logic if live fails or station mismatch
          arrivalMins = getDeterministicFallback(crossing.id, t.no, 'A');
        }
        
        // distance calculation mock based on speed
        let dist = 0;
        if (arrivalMins > 0) dist = Math.min((arrivalMins / 60) * t.speed, distA);
        
        computedTrains.push({
          no: t.no,
          name: t.name,
          speed: t.speed,
          distance: dist,
          arrivalTime: arrivalMins,
          originCode: crossing.station_a.code,
          originName: crossing.station_a.name
        });
      }
      
      for (const t of targetTrainsB) {
        const liveData = await fetchLiveTrainSchedule(t.no);
        let arrivalMins = processTrainTracking(liveData, crossing.station_b.code);
        
        if (arrivalMins === null) {
           arrivalMins = getDeterministicFallback(crossing.id, t.no, 'B');
        }
        
        let dist = 0;
        if (arrivalMins > 0) dist = Math.min((arrivalMins / 60) * t.speed, distB);

        computedTrains.push({
          no: t.no,
          name: t.name,
          speed: t.speed,
          distance: dist,
          arrivalTime: arrivalMins,
          originCode: crossing.station_b.code,
          originName: crossing.station_b.name
        });
      }
      
      // Return only trains within a reasonable window, sort them
      const validTrains = computedTrains.filter(t => t.arrivalTime >= -10 && t.arrivalTime <= 60);
      validTrains.sort((x, y) => x.arrivalTime - y.arrivalTime);
      
      return validTrains;
    }
    
    const CROSSING_SCHEDULES = {
      1: { a: 4.5, b: 18.0 },  // Balkeshwar Gate
      2: { a: 9.0, b: 24.5 },  // Sikandra Road Gate
      3: { a: 13.5, b: 27.0 }, // Pratap Nagar Gate
      4: { a: 3.0, b: 16.5 },  // Nalbund Gate

    function getDeterministicFallback(crossingId, trainNo, side) {
      // Similar to the old schedule logic, compute a fake time 
      const cycleLength = 30; // 30-minute cycle
      const nowMs = Date.now();
      const currentCycleStart = Math.floor(nowMs / (cycleLength * 60000)) * (cycleLength * 60000);
      const elapsedMinutes = (nowMs - currentCycleStart) / 60000;
      
      let schedule = CROSSING_SCHEDULES[crossingId] || { a: 5.0, b: 20.0 };
      if (!CROSSING_SCHEDULES[crossingId]) {
        schedule = { a: (crossingId % 20) + 1, b: ((crossingId * 3) % 15) + 10 };
      }
      
      // Hash trainNo somewhat to differentiate
      let hash = trainNo.charCodeAt(0) + trainNo.charCodeAt(trainNo.length - 1);
      
      let diff = (side === 'A' ? schedule.a : schedule.b) - elapsedMinutes + (hash % 15);
      if (diff > cycleLength) diff -= cycleLength;
      if (diff < -5) diff += cycleLength;
      return diff;
    }

    // Legacy calculation (kept as fallback or reference if needed)
    function getApproachingTrains(crossing, distA, distB) {
      let schedule = CROSSING_SCHEDULES[crossing.id];
      if (!schedule) {
        // Deterministic pseudo-random schedule for custom gates based on ID
        const offsetA = (crossing.id % 20) + 1;
        const offsetB = ((crossing.id * 3) % 15) + 10;
        schedule = { a: offsetA, b: offsetB };
      }
      const cycleLength = 30; // 30-minute cycle
      
      const nowMs = Date.now();
      const currentCycleStart = Math.floor(nowMs / (cycleLength * 60000)) * (cycleLength * 60000);
      const elapsedMinutes = (nowMs - currentCycleStart) / 60000; // continuous float 0.0 to 30.0

      const computedTrains = [];

      // Check Train A (origin station_a)
      let diffA = schedule.a - elapsedMinutes;
      if (diffA < -3) diffA += cycleLength;
      else if (diffA > cycleLength - 3) diffA -= cycleLength;

      // Check Train B (origin station_b)
      let diffB = schedule.b - elapsedMinutes;
      if (diffB < -3) diffB += cycleLength;
      else if (diffB > cycleLength - 3) diffB -= cycleLength;

      // Train A approaching / passing
      if (diffA <= 25) {
        const poolA = STATION_TRAINS[crossing.station_a.code] || [];
        if (poolA.length > 0) {
          const baseTrain = poolA[crossing.id % poolA.length];
          const noise = Math.sin(crossing.id + elapsedMinutes) * 3;
          const speed = Math.round(baseTrain.speed + noise);
          let distance = 0;
          if (diffA > 0) {
            distance = (diffA / 60) * speed;
            if (distance > distA) distance = distA;
          }
          computedTrains.push({
            no: baseTrain.no,
            name: baseTrain.name,
            speed: speed,
            distance: distance,
            arrivalTime: diffA,
            originCode: crossing.station_a.code,
            originName: crossing.station_a.name
          });
        }
      }

      // Train B approaching / passing
      if (diffB <= 25) {
        const poolB = STATION_TRAINS[crossing.station_b.code] || [];
        if (poolB.length > 0) {
          const baseTrain = poolB[(crossing.id + 3) % poolB.length];
          const noise = Math.cos(crossing.id + elapsedMinutes) * 3;
          const speed = Math.round(baseTrain.speed + noise);
          let distance = 0;
          if (diffB > 0) {
            distance = (diffB / 60) * speed;
            if (distance > distB) distance = distB;
          }
          computedTrains.push({
            no: baseTrain.no,
            name: baseTrain.name,
            speed: speed,
            distance: distance,
            arrivalTime: diffB,
            originCode: crossing.station_b.code,
            originName: crossing.station_b.name
          });
        }
      }

      // Sort by arrivalTime ascending
      computedTrains.sort((x, y) => x.arrivalTime - y.arrivalTime);
      return computedTrains;
    }

    // Process all crossings
    async function evaluateAllCrossings() {
      const crossings = getCrossings();
      
      const refreshBtn = document.getElementById("refresh-btn");
      if (refreshBtn) refreshBtn.style.opacity = 0.5;

      const evalPromises = crossings.map(async (c) => {
        const distA = haversineKm(c.lat, c.lon, c.station_a.lat, c.station_a.lon);
        const distB = haversineKm(c.lat, c.lon, c.station_b.lat, c.station_b.lon);

        const allTrains = await getApproachingTrainsLive(c, distA, distB);

        // Determine critical status using the nearest train
        let severity = 1; // 1 = OPEN, 2 = CLOSING SOON, 3 = CLOSED
        let stateCode = "OPEN";
        let stateLabel = "🟢 OPEN";
        let headline = "No trains in 8-min window. Gate clear.";
        let nearestTrain = null;

        if (allTrains.length > 0) {
          nearestTrain = allTrains[0];
          const time = nearestTrain.arrivalTime;

          if (time <= 3.0 && time >= -2.0) {
            // Train arrives within 3 mins or just passed 2 mins ago
            severity = 3;
            stateCode = "CLOSED";
            stateLabel = "🔴 CLOSED";
            if (time < 0) {
              headline = `Gate DOWN — #${nearestTrain.no} ${nearestTrain.name} is clearing the crossing.`;
            } else {
              headline = `Gate DOWN — #${nearestTrain.no} ${nearestTrain.name} passes in ~${Math.ceil(time)} min.`;
            }
          } else if (time > 3.0 && time <= 8.0) {
            severity = 2;
            stateCode = "SOON";
            stateLabel = "🟡 CLOSING SOON";
            const closingIn = Math.ceil(time - 3.0);
            headline = `Closing in ~${closingIn} min — #${nearestTrain.no} ${nearestTrain.name} in ~${Math.ceil(time)} min.`;
          } else {
            severity = 1;
            stateCode = "OPEN";
            stateLabel = "🟢 OPEN";
            if (time > 8.0 && time <= 20.0) {
              headline = `#${nearestTrain.no} ${nearestTrain.name} is ~${Math.ceil(time)} min away. Gate is open.`;
            } else {
              headline = "No trains in 8-min window. Gate clear.";
            }
          }
        }

        return {
          crossing: c,
          distA: distA,
          distB: distB,
          trains: allTrains,
          nearestTrain: nearestTrain,
          severity: severity,
          stateCode: stateCode,
          stateLabel: stateLabel,
          headline: headline
        };
      });

      const results = await Promise.all(evalPromises);

      // Sort crossings WORST FIRST (Closed=3 -> Soon=2 -> Open=1), then by arrival time ascending if same
      results.sort((a, b) => {
        if (b.severity !== a.severity) {
          return b.severity - a.severity;
        }
        const aTime = a.nearestTrain ? a.nearestTrain.arrivalTime : 9999;
        const bTime = b.nearestTrain ? b.nearestTrain.arrivalTime : 9999;
        return aTime - bTime;
      });

      renderDashboard(results);
      
      if (refreshBtn) refreshBtn.style.opacity = 1;
    }

        footer.style.display = 'flex';
        icon.style.transform = 'rotate(180deg)';
        card.classList.add('expanded');
      }
    }

    // Reset periodic timer & run evaluations
    function runRefreshCycle() {
      evaluateAllCrossings();
      countdownSecs = REFRESH_CYCLE_SECONDS;
      updateCountdownLabel();
    }

    // Edit Gate Name function
    function editGateName(id, defaultName) {
      const currentName = localStorage.getItem('gateName_' + id) || defaultName;
      const newName = prompt("Enter a local name for Gate " + id + " (leave blank to reset to default):", currentName);
      if (newName !== null) {
        const trimmed = newName.trim();
        if (trimmed === "" || trimmed === defaultName) {
          localStorage.removeItem('gateName_' + id);
        } else {
          localStorage.setItem('gateName_' + id, trimmed);
        }
        evaluateAllCrossings(); // re-render immediately
      }
    }

    // Update countdown label in UI
    function updateCountdownLabel() {
      document.getElementById("timer-display").textContent = `AUTO-REFRESH IN ${countdownSecs}s`;
    }

    // Trigger manual refresh
    function triggerManualRefresh() {
      const btn = document.getElementById("refresh-btn");
      btn.style.opacity = "0.6";
      btn.disabled = true;

      // Force evaluate
      evaluateAllCrossings();
      
      // Reset variables
      countdownSecs = REFRESH_CYCLE_SECONDS;
      updateCountdownLabel();

      // UI polish, enable back after slight visual delay
      setTimeout(() => {
        btn.style.opacity = "1";
        btn.disabled = false;
      }, 500);
    }

    function openAddModal() {
      document.getElementById('add-modal').classList.add('active');
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('active');
      document.getElementById('add-name').value = '';
      document.getElementById('add-area').value = '';
      document.getElementById('add-lat').value = '';
      document.getElementById('add-lon').value = '';
    }

    async function saveNewCrossing() {
      const name = document.getElementById('add-name').value.trim();
      const area = document.getElementById('add-area').value.trim();
      const lat = parseFloat(document.getElementById('add-lat').value);
      const lon = parseFloat(document.getElementById('add-lon').value);

      if (!name || isNaN(lat) || isNaN(lon)) {
        alert("Please provide a valid Name, Latitude, and Longitude.");
        return;
      }

      const saveBtn = document.querySelector('.btn-primary');
      const originalText = saveBtn.textContent;
      saveBtn.textContent = 'Validating...';
      saveBtn.disabled = true;

      try {
        // Query Overpass API with a 300-meter radius
        const query = `[out:json];node(around:300,${lat},${lon})["railway"="level_crossing"];out;`;
        const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
        const data = await response.json();

        if (!data.elements || data.elements.length === 0) {
          alert("No railway crossing found near these coordinates. Please provide exact and correct coordinates.");
          saveBtn.textContent = originalText;
          saveBtn.disabled = false;
          return;
        }
      } catch (error) {
        console.error("Validation error:", error);
        alert("Could not validate coordinates at this time. Please check your network connection.");
        saveBtn.textContent = originalText;
        saveBtn.disabled = false;
        return;
      }

      saveBtn.textContent = originalText;
      saveBtn.disabled = false;

      // Find 2 closest stations
      const sortedStations = [...AVAILABLE_STATIONS].sort((a, b) => {
        return haversineKm(lat, lon, a.lat, a.lon) - haversineKm(lat, lon, b.lat, b.lon);
      });
      const stationA = sortedStations[0];
      const stationB = sortedStations[1];

      const newCrossing = {
        id: Math.floor(Date.now() / 1000), // shorter int ID
        name: name,
        area: area || "Custom Location",
        lat: lat,
        lon: lon,
        track: "User Defined Track",
        isCustom: true,
        station_a: { name: stationA.name, code: stationA.code, lat: stationA.lat, lon: stationA.lon },
        station_b: { name: stationB.name, code: stationB.code, lat: stationB.lat, lon: stationB.lon }
      };

      userCrossings.push(newCrossing);
      localStorage.setItem('userCrossings', JSON.stringify(userCrossings));
      
      closeAddModal();
      evaluateAllCrossings();
    }

    function deleteCrossing(id) {
      if(confirm("Are you sure you want to delete this custom crossing?")) {
        userCrossings = userCrossings.filter(c => c.id !== id);
        localStorage.setItem('userCrossings', JSON.stringify(userCrossings));
        localStorage.removeItem('gateName_' + id); // cleanup custom name if any
        evaluateAllCrossings();
      }
    }

    // Kick-start app cycles
    function init() {
      // Clock updates every second
      updateClock();
      clockInterval = setInterval(updateClock, 1000);

      // Perform initial evaluation
      evaluateAllCrossings();

      // Countdown loop (ticks down 1s at a time)
      autoRefreshInterval = setInterval(() => {
        countdownSecs--;
        if (countdownSecs < 0) {
          runRefreshCycle();
        } else {
          updateCountdownLabel();
        }
      }, 1000);
    }

    // Run on startup
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
